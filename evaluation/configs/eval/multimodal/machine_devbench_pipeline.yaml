# MachineDevBench Pipeline Configuration
# Runs MachineDevBench multimodal evaluation across multiple styles in parallel
# with a shared model.
#
# Override `task_eval_config.data_root` to point at a benchmark folder
# (e.g. data/coco_20260422_123739) and override `styles` to select which
# visual styles to evaluate.

defaults:
  - machine_devbench_pipeline_base
  - _self_

_target_: "evaluation.multimodal.machine_devbench.pipeline.MachineDevBenchPipeline"

name: "machine_devbench_pipeline"

output_dir: "${oc.env:HOME}/egobabyvlm_experiments/evals"

model: ${model}

seed: 42

styles:
  - realistic
  - cartoon

task_eval_config:
  _target_: "evaluation.multimodal.machine_devbench.base.MachineDevBenchEvalModule"
  name: "machine_devbench"
  data_root: "${oc.env:MACHINE_DEVBENCH_DATA_ROOT}"
  tasks: null
  batch_size: 32
  num_workers: 8

launcher:
  _target_: "stopes.core.Launcher"
  cluster: "slurm"
  log_folder: ${hydra:sweep.dir}/executor_logs
  config_dump_dir: ${hydra:sweep.dir}/config_logs
  cache:
    caching_dir: ${hydra:sweep.dir}/cache
  update_parameters:
    slurm_qos: "???"
    slurm_account: "???"

aggregate_results: true
