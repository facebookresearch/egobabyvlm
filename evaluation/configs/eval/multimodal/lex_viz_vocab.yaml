# @group multimodal
# DevBench Lex-VizVocab Evaluation

defaults:
  - devbench
  - _self_

output_dir: "${oc.env:HOME}/egobabyvlm_experiments/evals"

_target_: "evaluation.multimodal.devbench.base.DevBenchLexVizVocabEvalModule"

name: "lex-viz_vocab"

dataset:
  _target_: "evaluation.data.devbench.DevBenchDataset"
  name: "lex-viz_vocab"
  kwargs:
    dataset_folder: "${oc.env:DEVBENCH_DATA_ROOT}/lex-viz_vocab"

human_data_path: "${oc.env:DEVBENCH_DATA_ROOT}/lex-viz_vocab/human.csv"

model: ${model}

seed: 42
