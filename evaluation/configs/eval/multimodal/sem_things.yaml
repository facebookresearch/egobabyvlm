# @group multimodal
# DevBench Sem-Things Evaluation

defaults:
  - devbench
  - _self_

output_dir: "${oc.env:HOME}/egobabyvlm_experiments/evals"

_target_: "evaluation.multimodal.devbench.base.DevBenchSemThingsEvalModule"

name: "sem-things"

dataset:
  _target_: "evaluation.data.devbench.DevBenchDataset"
  name: "sem-things"
  kwargs:
    dataset_folder: "${oc.env:DEVBENCH_DATA_ROOT}/sem-things"

human_data_path: "${oc.env:DEVBENCH_DATA_ROOT}/sem-things/spose_similarity.mat"

model: ${model}

seed: 42
