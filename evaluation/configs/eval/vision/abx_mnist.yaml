# @group vision
# ABX MNIST Evaluation

defaults:
  - abx
  - _self_

output_dir: "${oc.env:HOME}/egobabyvlm_experiments/evals"

dataset:
  _target_: "evaluation.data.abx.MNISTClassificationDataset"
  name: "mnist"
  kwargs:
    dataset_root: "${oc.env:MNIST_ROOT}"
    mode: "test"

pooling: "cls"
last_n_layers: 1

num_triplets: 100
batch_size: 512
num_workers: 12
seed: 42

model: ${model}
