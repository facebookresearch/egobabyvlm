name: Bug report
description: Report a reproducible problem with EgoBabyVLM.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much
        as you can — minimal reproducing examples make fixes much faster.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: |
        I ran `pixi run -e dev python -m evaluation.eval_launcher ...` and got X,
        but expected Y.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Exact commands, configs, and inputs that trigger the bug.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Output of `pixi info` (or your equivalent), Python version, CUDA / GPU
        info, OS, and whether you're running locally vs SLURM.
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / tracebacks
      description: Full traceback if applicable.
      render: shell
