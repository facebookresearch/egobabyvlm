# Off-the-shelf OpenAI CLIP ViT-B/16 with the QuickGELU patch (matches the
# original release's tokenizer/quantization behavior). Smallest model that's
# useful for end-to-end smoke tests.
#
# The destination of these fields is decided by the consumer's `defaults` line
# (e.g. ``model@matched_processor.model: vit_b16_openai``).

model_name: ViT-B-16-quickgelu
pretrained: openai
mode: eval
is_video_model: false
